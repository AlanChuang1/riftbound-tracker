services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: riftbound
      POSTGRES_PASSWORD: riftbound_dev
      POSTGRES_DB: riftbound_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://riftbound:riftbound_dev@db:5432/riftbound_tracker
    depends_on:
      - db
    restart: always

volumes:
  pgdata:
